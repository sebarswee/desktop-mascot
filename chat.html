<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/chat.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>与宠物对话</title>
    <script type="module" src="/src/chat.ts" defer></script>
  </head>
  <body>
    <div class="chat-wrapper">
      <div class="chat-header">
        <span class="chat-title">AI 助手</span>
        <div class="header-actions">
          <button id="clear-btn" class="header-btn" title="清除对话">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
          <button id="close-btn" class="close-btn" title="关闭">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      </div>

      <div id="messages" class="messages">
        <div class="welcome-state" id="welcome-state">
          <h3>有什么我可以帮你的吗？</h3>
          <p>点击宠物或者使用快捷键随时唤出我</p>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="input-wrapper">
          <textarea
            id="chat-input"
            placeholder="发消息..."
            rows="1"
            autocomplete="off"
          ></textarea>
          <button id="send-btn" class="send-btn" title="发送">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
        <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
      </div>
    </div>
  </body>
</html>
