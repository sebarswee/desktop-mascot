<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/chat.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>与宠物对话</title>
    <script type="module" src="/src/chat.ts" defer></script>
  </head>
  <body>
    <div class="chat-wrapper">
      <div class="chat-header">
        <span class="chat-title">AI 助手</span>
        <button id="close-btn" class="close-btn" title="关闭">&times;</button>
      </div>
      <div id="messages" class="messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="输入消息..." autocomplete="off" />
        <button id="send-btn" class="send-btn">发送</button>
      </div>
    </div>
  </body>
</html>
